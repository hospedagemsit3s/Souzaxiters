<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Auxílio @Souza Xiters</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0000 0%, #4a0000 50%, #1a0000 100%);
      color: #fff;
      overflow-x: hidden;
    }

    /* Tela de Login */
    .login-container {
      width: 350px;
      padding: 40px;
      background: rgba(20, 20, 20, 0.95);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(255, 0, 0, 0.3);
      border: 1px solid rgba(255, 0, 0, 0.2);
      animation: fadeIn 0.5s ease-in;
    }

    .login-container h2 {
      text-align: center;
      color: #ff3333;
      margin-bottom: 30px;
      font-size: 28px;
      text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #ff6666;
      font-size: 14px;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      background: rgba(40, 40, 40, 0.8);
      border: 1px solid rgba(255, 0, 0, 0.3);
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: #ff3333;
      box-shadow: 0 0 10px rgba(255, 51, 51, 0.3);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff3333 0%, #cc0000 100%);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 51, 51, 0.4);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .error-message {
      color: #ff6666;
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    .discord-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #7289da;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .discord-link:hover {
      color: #99aab5;
    }

    /* Painel Principal */
    .container {
      width: 350px;
      padding: 25px;
      background: rgba(20, 20, 20, 0.95);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(255, 0, 0, 0.3);
      border: 1px solid rgba(255, 0, 0, 0.2);
      max-height: 80vh;
      overflow-y: auto;
      display: none;
      animation: slideIn 0.5s ease-out;
    }

    .container::-webkit-scrollbar {
      width: 8px;
    }

    .container::-webkit-scrollbar-track {
      background: rgba(40, 40, 40, 0.5);
      border-radius: 4px;
    }

    .container::-webkit-scrollbar-thumb {
      background: #ff3333;
      border-radius: 4px;
    }

    .container::-webkit-scrollbar-thumb:hover {
      background: #cc0000;
    }

    h2 {
      text-align: center;
      color: #ff3333;
      margin-bottom: 25px;
      font-size: 24px;
      text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
    }

    .logout-btn {
      width: 100%;
      padding: 10px;
      background: rgba(255, 51, 51, 0.2);
      border: 1px solid rgba(255, 51, 51, 0.4);
      border-radius: 6px;
      color: #ff6666;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      background: rgba(255, 51, 51, 0.3);
      color: #ff3333;
    }

    .mod-menu {
      display: block;
    }

    .menu-item {
      margin: 10px 0;
      padding: 14px;
      background: linear-gradient(135deg, rgba(255, 51, 51, 0.1) 0%, rgba(204, 0, 0, 0.1) 100%);
      border: 1px solid rgba(255, 51, 51, 0.3);
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      color: #ff6666;
      position: relative;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.3s ease;
      padding-left: 40px; /* Adiciona padding para o texto não ficar embaixo da seta */
    }

    .menu-item:hover {
      background: linear-gradient(135deg, rgba(255, 51, 51, 0.2) 0%, rgba(204, 0, 0, 0.2) 100%);
      border-color: #ff3333;
      transform: translateX(5px);
    }

    .menu-item::before {
      content: '►';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      transition: transform 0.3s ease;
      color: #ff3333;
    }

    .menu-item.open::before {
      transform: rotate(90deg);
    }

    .sub-options {
      display: none;
      padding: 15px 10px 10px 30px;
      background: rgba(10, 10, 10, 0.5);
      border-radius: 6px;
      margin-top: 10px;
      animation: fadeIn 0.3s ease;
    }

    .checkbox-label {
      font-size: 15px;
      color: #ffffff;
      display: flex;
      align-items: center;
      margin: 8px 0;
      cursor: pointer;
      transition: color 0.3s ease;
      user-select: none;
    }

    .checkbox-label:hover {
      color: #ff6666;
    }

    .checkbox-label input {
      width: 18px;
      height: 18px;
      margin-right: 12px;
      cursor: pointer;
      accent-color: #ff3333;
    }

    .command-prompt {
      margin-top: 20px;
      padding: 15px;
      background: rgba(10, 10, 10, 0.8);
      border: 1px solid rgba(255, 51, 51, 0.3);
      border-radius: 8px;
      font-size: 13px;
      max-height: 150px;
      overflow-y: auto;
      color: #fff;
      font-family: 'Courier New', monospace;
    }

    .command-prompt::-webkit-scrollbar {
      width: 6px;
    }

    .command-prompt::-webkit-scrollbar-track {
      background: rgba(40, 40, 40, 0.5);
    }

    .command-prompt::-webkit-scrollbar-thumb {
      background: #ff3333;
      border-radius: 3px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <!-- Tela de Login -->
  <div class="login-container" id="loginContainer">
    <h2>🔐 Login</h2>
    <div class="input-group">
      <label for="key">Key de Acesso</label>
      <input type="password" id="key" placeholder="Digite sua Key" autocomplete="off" />
    </div>
    <button class="login-btn" onclick="handleLogin()">Entrar</button>
    <div class="error-message" id="errorMessage">Chave de acesso incorreta!</div>
    <a href="https://discord.gg/seulinkdiscord" target="_blank" class="discord-link">Acessar nosso Discord</a>
  </div>

  <!-- Painel Principal -->
  <div class="container" id="mainPanel">
    <div class="mod-menu" id="modMenu">
      <h2>Auxílio @Souza Xiters</h2>
      <button class="logout-btn" onclick="handleLogout()">Sair</button>

      <div class="menu-item" onclick="toggleOptions(this, 'trick-options')">Trick Functions</div>
      <div class="sub-options" id="trick-options">
        <label class="checkbox-label">
          <input type="checkbox" onchange="updatePrompt(this, 'TrickHead')">
          <span>TrickHead</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" onchange="updatePrompt(this, 'TrickLock')">
          <span>Trick Lock</span>
        </label>
      </div>

      <div class="menu-item" onclick="toggleOptions(this, 'legit-options')">Auxilio Functions</div>
      <div class="sub-options" id="legit-options">
        <label class="checkbox-label">
          <input type="checkbox" onchange="updatePrompt(this, 'AuxilioRecuo')">
          <span>Auxilio Recuo</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" onchange="updatePrompt(this, 'AuxilioScope')">
          <span>Auxilio Scope</span>
        </label>
      </div>

      <div class="menu-item" onclick="toggleOptions(this, 'color-options')">Menu Color</div>
      <div class="sub-options" id="color-options">
        <label class="checkbox-label">
          <input type="checkbox" onchange="updatePrompt(this, 'RedColor')">
          <span>Red Color</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" onchange="updatePrompt(this, 'BlueColor')">
          <span>Blue Color</span>
        </label>
      </div>

      <div class="command-prompt" id="commandPrompt">
        <span style="color: #ff6666;">Sistema iniciado...</span><br>
      </div>
    </div>
  </div>

  <!-- JavaScript Otimizado -->
  <script>
    // Configurações de login (em produção, use autenticação no servidor)
    const VALID_KEY = 'Souzaxiters-key-98k7h'; // Substitua pela sua chave única

    // Gerenciamento de loops
    const loopTimers = {};

    // Sistema de Login
    function handleLogin() {
      const key = document.getElementById('key').value.trim();
      const errorMessage = document.getElementById('errorMessage');
      const loginContainer = document.getElementById('loginContainer');
      const mainPanel = document.getElementById('mainPanel');

      if (key === VALID_KEY) {
        errorMessage.style.display = 'none';
        loginContainer.style.display = 'none';
        mainPanel.style.display = 'block';
        logMessage('Login realizado com sucesso!', 'lightgreen');
      } else {
        errorMessage.style.display = 'block';
        document.getElementById('key').value = '';
      }
    }

    function handleLogout() {
      const loginContainer = document.getElementById('loginContainer');
      const mainPanel = document.getElementById('mainPanel');
      
      // Limpar todos os loops ativos
      Object.keys(loopTimers).forEach(stopLoop);
      
      // Resetar campo
      document.getElementById('key').value = '';

      // Esconder painel principal e mostrar tela de login
      mainPanel.style.display = 'none';
      loginContainer.style.display = 'flex'; // Usar flex para centralizar
      logMessage('Logout realizado.', 'orange');
    }

    function toggleOptions(menuItem, subOptionsId) {
      menuItem.classList.toggle('open');
      const subOptions = document.getElementById(subOptionsId);
      if (subOptions.style.display === 'block') {
        subOptions.style.display = 'none';
      } else {
        subOptions.style.display = 'block';
      }
    }

    function updatePrompt(checkbox, command) {
      const commandPrompt = document.getElementById('commandPrompt');
      const message = checkbox.checked ? 
        `<span style="color: #00ff00;">Ativado: ${command}</span>` : 
        `<span style="color: #ff0000;">Desativado: ${command}</span>`;
      logMessage(message);

      if (checkbox.checked) {
        startLoop(command);
      } else {
        stopLoop(command);
      }
    }

    function logMessage(message, color = '#fff') {
      const commandPrompt = document.getElementById('commandPrompt');
      const p = document.createElement('p');
      p.innerHTML = `<span style="color: ${color};">${message}</span>`;
      commandPrompt.appendChild(p);
      commandPrompt.scrollTop = commandPrompt.scrollHeight;
    }

    function startLoop(command) {
      // Simula um loop para cada comando ativado
      // Em um cenário real, você enviaria este comando para um backend
      if (!loopTimers[command]) {
        logMessage(`Loop para ${command} iniciado.`, 'lightblue');
        loopTimers[command] = setInterval(() => {
          // console.log(`Executando ${command}...`);
        }, 1000); // Executa a cada 1 segundo
      }
    }

    function stopLoop(command) {
      if (loopTimers[command]) {
        clearInterval(loopTimers[command]);
        delete loopTimers[command];
        logMessage(`Loop para ${command} parado.`, 'orange');
      }
    }
  </script>
</body>
</html>
