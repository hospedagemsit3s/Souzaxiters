<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AUXILIO IOS - EXTERNAL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }

        /* Container estilo exatamente igual à imagem */
        .panel {
            max-width: 400px;
            width: 100%;
            background: #111111;
            border-radius: 40px;
            padding: 30px 24px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #ff2222;
        }

        /* @SOUZA */
        .souza {
            text-align: center;
            margin-bottom: 25px;
        }
        .souza h1 {
            font-size: 42px;
            font-weight: 800;
            color: #ff3333;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 0 #440000;
        }

        /* AIMLOCK INFO */
        .aimlock-section {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid #ff3333;
        }
        .aimlock-title {
            font-size: 20px;
            font-weight: 800;
            color: #ff4444;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }
        .aimlock-desc {
            font-size: 14px;
            color: #ff8888;
            line-height: 1.5;
            margin-bottom: 12px;
            font-weight: 500;
        }
        .aimlock-desc span {
            color: #ff6666;
        }
        .fov-line {
            font-size: 14px;
            color: #ff7777;
            margin-top: 8px;
            font-weight: 500;
        }

        /* AUXILIO EXTERNAL */
        .auxilio-title {
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            color: #ff3333;
            margin: 20px 0 15px;
            letter-spacing: 1px;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 15px;
            border: 1px solid #ff4444;
        }

        /* funções: */
        .funcoes {
            margin: 20px 0;
        }
        .funcoes-label {
            font-size: 18px;
            font-weight: 700;
            color: #ff5555;
            margin-bottom: 12px;
            display: block;
        }
        .funcoes-buttons {
            display: flex;
            gap: 15px;
            justify-content: space-between;
        }
        .funcao-btn {
            flex: 1;
            background: #1f1f1f;
            border: 1px solid #ff4444;
            border-radius: 50px;
            padding: 12px 0;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            color: #ff8888;
            cursor: pointer;
            transition: all 0.2s;
        }
        .funcao-btn.active {
            background: #ff2222;
            color: white;
            border-color: #ff0000;
            box-shadow: 0 0 10px rgba(255,0,0,0.5);
        }

        /* INJETAR */
        .injetar {
            margin: 25px 0;
        }
        .injetar-btn {
            width: 100%;
            background: #ff2222;
            border: none;
            border-radius: 60px;
            padding: 18px;
            font-size: 28px;
            font-weight: 800;
            color: white;
            text-align: center;
            cursor: pointer;
            transition: 0.1s linear;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 5px 0 #880000;
        }
        .injetar-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #880000;
        }

        /* AUXILIO IOS footer */
        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #ff3333;
        }
        .footer span {
            font-size: 20px;
            font-weight: 800;
            color: #ff4444;
            letter-spacing: 1px;
        }

        /* Status indicators */
        .status-badge {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background: #ff3333;
            margin-right: 8px;
            box-shadow: 0 0 5px red;
        }
        .log-area {
            background: #0a0a0a;
            border-radius: 15px;
            padding: 12px;
            margin-top: 20px;
            font-size: 11px;
            font-family: monospace;
            color: #ff7777;
            border: 1px solid #ff3333;
        }
        .log-line {
            margin: 5px 0;
        }

        /* Slider FOV */
        .fov-control {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .fov-control input {
            flex: 1;
            accent-color: #ff2222;
        }
        .fov-value {
            background: #1a1a1a;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            color: #ff6666;
        }
    </style>
</head>
<body>
    <div class="panel">
        <!-- @SOUZA -->
        <div class="souza">
            <h1>@SOUZA</h1>
        </div>

        <!-- AIMLOCK INFO -->
        <div class="aimlock-section">
            <div class="aimlock-title">## AIMLOCK INFO</div>
            <div class="aimlock-desc">
                AIMBOT No Recoil AIMBOT 2X BYPASS Fov <span id="fovDisplayText">5%</span>
            </div>
            <div class="fov-line">⚡ BYPASS ATIVO | ANTI-RECOIL</div>
            <div class="fov-control">
                <span style="color:#ff7777; font-size:13px;">FOV:</span>
                <input type="range" id="fovSlider" min="1" max="12" step="0.5" value="5">
                <span class="fov-value" id="fovPercent">5%</span>
            </div>
        </div>

        <!-- AUXILIO EXTERNAL -->
        <div class="auxilio-title">**AUXILIO EXTERNAL**</div>

        <!-- funções: AO ATIRA / AO OLHA -->
        <div class="funcoes">
            <span class="funcoes-label">funções:</span>
            <div class="funcoes-buttons">
                <div class="funcao-btn" data-modo="atira" id="btnAtira">AO ATIRA</div>
                <div class="funcao-btn" data-modo="olha" id="btnOlha">AO OLHA</div>
            </div>
        </div>

        <!-- INJETAR -->
        <div class="injetar">
            <button class="injetar-btn" id="injetarBtn">INJETAR</button>
        </div>

        <!-- AUXILIO IOS -->
        <div class="footer">
            <span># AUXILIO IOS</span>
        </div>

        <!-- Log / Status area -->
        <div class="log-area" id="logArea">
            <div class="log-line"><span class="status-badge"></span> SYSTEM READY</div>
            <div class="log-line" id="statusMsg">⚙️ Aguardando injeção...</div>
            <div class="log-line" id="modoStatus">Modo: --</div>
        </div>
    </div>

    <script>
        // Estado da engine
        let engineState = {
            injected: false,
            currentModo: "atira", // atira ou olha
            fov: 5.0,
            noRecoil: true,       // SEMPRE ATIVO (AIMBOT No Recoil)
            bypass2x: true,       // SEMPRE ATIVO (AIMBOT 2X BYPASS)
            aimlockActive: false
        };

        // DOM elements
        const btnAtira = document.getElementById('btnAtira');
        const btnOlha = document.getElementById('btnOlha');
        const injetarBtn = document.getElementById('injetarBtn');
        const fovSlider = document.getElementById('fovSlider');
        const fovPercent = document.getElementById('fovPercent');
        const fovDisplayText = document.getElementById('fovDisplayText');
        const statusMsg = document.getElementById('statusMsg');
        const modoStatus = document.getElementById('modoStatus');

        // Função de log
        function updateStatus(message, isError = false) {
            statusMsg.innerHTML = `${isError ? '⚠️' : '✓'} ${message}`;
            // auto reset visual after 3s? melhor manter
        }

        function updateModoDisplay() {
            if (engineState.currentModo === "atira") {
                modoStatus.innerHTML = `Modo: 🔫 AO ATIRA (ativado ao disparar)`;
            } else {
                modoStatus.innerHTML = `Modo: 👁️ AO OLHA (ativado ao mirar)`;
            }
        }

        // Atualiza UI dos botões
        function updateUI() {
            if (engineState.currentModo === "atira") {
                btnAtira.classList.add('active');
                btnOlha.classList.remove('active');
            } else {
                btnOlha.classList.add('active');
                btnAtira.classList.remove('active');
            }
            
            // FOV display
            fovPercent.innerText = engineState.fov + "%";
            fovDisplayText.innerText = engineState.fov + "%";
            fovSlider.value = engineState.fov;
        }

        // Engine principal (simula o backend com Java)
        function executeEngine() {
            if (!engineState.injected) {
                updateStatus("Engine não injetada. Clique em INJETAR primeiro.", true);
                return false;
            }
            
            // As funções AIMBOT No Recoil e AIMBOT 2X BYPASS estão sempre ativas
            let actionMsg = "";
            let triggerType = engineState.currentModo === "atira" ? "DISPARO" : "MIRA/OLHAR";
            
            actionMsg = `🎯 AIMBOT ATIVADO! (${triggerType}) | No Recoil: ON | 2X BYPASS: ON | FOV: ${engineState.fov}%`;
            
            // Simula efeito do AIMBOT 2X BYPASS
            if (engineState.bypass2x) {
                actionMsg += " [BYPASS DETECTADO]";
            }
            
            updateStatus(actionMsg);
            
            // Adiciona log extra no console visual
            const logArea = document.getElementById('logArea');
            const newLog = document.createElement('div');
            newLog.className = 'log-line';
            newLog.style.fontSize = '10px';
            newLog.style.opacity = '0.8';
            newLog.innerHTML = `› ${new Date().toLocaleTimeString()} | ${actionMsg.substring(0, 60)}`;
            logArea.appendChild(newLog);
            // Mantém apenas últimas 5 linhas
            while(logArea.children.length > 8) {
                if(logArea.children[2]) logArea.removeChild(logArea.children[2]);
            }
            
            return true;
        }

        // Simula o monitoramento do jogo (gatilho automático baseado no modo)
        // Isso faz a engine responder como se estivesse sempre verificando "AO ATIRA" ou "AO OLHA"
        let lastTriggerTime = 0;
        function gameLoopSimulation() {
            if (!engineState.injected) return;
            
            // Simula um evento periódico de "jogador atirando" ou "jogador mirando"
            // Dependendo do modo, aciona a engine com mais frequência
            const now = Date.now();
            // Para demonstrar as funções, vamos gerar eventos a cada 4-6 segundos simulando ação do usuário
            if (now - lastTriggerTime > 4500) {
                lastTriggerTime = now;
                
                if (engineState.currentModo === "atira") {
                    // Simula que o jogador está atirando
                    updateStatus(`🔫 [GATILHO] Disparo detectado! Executando AIMBOT No Recoil...`);
                    executeEngine();
                } else {
                    // Simula que o jogador está olhando/mirando
                    updateStatus(`👁️ [MIRA] AO OLHA ativado! AIMBOT 2X BYPASS em ação...`);
                    executeEngine();
                }
            }
        }

        // Eventos dos botões de função (AO ATIRA / AO OLHA)
        btnAtira.addEventListener('click', () => {
            if (engineState.currentModo === "atira") return;
            engineState.currentModo = "atira";
            updateUI();
            updateModoDisplay();
            updateStatus(`Modo alterado para: AO ATIRA (AIMBOT ativado ao disparar)`);
            if (engineState.injected) {
                executeEngine();
            }
        });

        btnOlha.addEventListener('click', () => {
            if (engineState.currentModo === "olha") return;
            engineState.currentModo = "olha";
            updateUI();
            updateModoDisplay();
            updateStatus(`Modo alterado para: AO OLHA (AIMBOT ativado ao mirar/olhar)`);
            if (engineState.injected) {
                executeEngine();
            }
        });

        // FOV slider
        fovSlider.addEventListener('input', (e) => {
            engineState.fov = parseFloat(e.target.value);
            updateUI();
            updateStatus(`FOV ajustado para ${engineState.fov}% (campo de mira do aimbot)`);
            if (engineState.injected) {
                // Atualiza engine com novo FOV
                updateStatus(`⚡ AIMBOT recalibrado para FOV ${engineState.fov}% com 2X BYPASS`);
            }
        });

        // Botão INJETAR - ativa todas as funções
        injetarBtn.addEventListener('click', () => {
            if (!engineState.injected) {
                engineState.injected = true;
                engineState.noRecoil = true;
                engineState.bypass2x = true;
                engineState.aimlockActive = true;
                
                updateUI();
                updateModoDisplay();
                updateStatus(`✅ INJETADO! AUXILIO EXTERNAL ativado.`);
                
                // Adiciona log de confirmação com todas as funções
                const logArea = document.getElementById('logArea');
                const injectLog = document.createElement('div');
                injectLog.className = 'log-line';
                injectLog.style.color = '#ff5555';
                injectLog.style.fontWeight = 'bold';
                injectLog.innerHTML = `💉 INJEÇÃO REALIZADA COM SUCESSO | AIMBOT No Recoil ✅ | AIMBOT 2X BYPASS ✅ | FOV ${engineState.fov}%`;
                logArea.appendChild(injectLog);
                
                // Mensagem adicional
                setTimeout(() => {
                    updateStatus(`🔴 Engine rodando | Modo: ${engineState.currentModo === "atira" ? "AO ATIRA" : "AO OLHA"} | Todos os módulos ativos`);
                    executeEngine();
                }, 100);
            } else {
                // Se já injetado, mostra status e reforça
                updateStatus(`🔄 Engine já ativa. Reforçando hooks do AIMBOT...`);
                executeEngine();
                // Simula bypass ativo
                updateStatus(`⚡ 2X BYPASS ativo | Anti-Recoil ativo | FOV ${engineState.fov}%`);
            }
        });

        // Inicializa UI
        updateUI();
        updateModoDisplay();
        updateStatus("Pronto. Clique em INJETAR para ativar AIMBOT No Recoil + 2X BYPASS");
        
        // Inicia loop de simulação do jogo (gatilhos automáticos)
        setInterval(() => {
            gameLoopSimulation();
        }, 3000);
        
        // Garante que o FOV esteja sempre visivel conforme o texto original
        // Adiciona também uma simulação do AIMBOT 2X BYPASS no display
        const aimlockSection = document.querySelector('.aimlock-section');
        const originalDesc = document.querySelector('.aimlock-desc');
        
        // Atualiza dinamicamente o texto para refletir status dos recursos extras
        function updateFeatureText() {
            if (engineState.injected) {
                const featureSpan = document.querySelector('.aimlock-desc span') || document.createElement('span');
                if (document.querySelector('.aimlock-desc span')) {
                    document.querySelector('.aimlock-desc span').innerHTML = `${engineState.fov}% ✅`;
                } else {
                    // recria se necessário
                    const descDiv = document.querySelector('.aimlock-desc');
                    if (descDiv) {
                        descDiv.innerHTML = `AIMBOT No Recoil AIMBOT 2X BYPASS Fov <span id="fovDisplayText">${engineState.fov}%</span> ✅`;
                    }
                }
            }
        }
        
        setInterval(updateFeatureText, 500);
        
        // Para ficar extremamente igual à foto, garante que os textos estejam conforme o arquivo
        // "AIMBOT No Recoil AIMBOT 2X BYPASS Fov 5%" exibido corretamente
        // Adiciona tooltip visual de que o bypass está ativo após injeção
        const styleInject = document.createElement('style');
        styleInject.textContent = `
            .funcao-btn.active {
                background: #ff2222 !important;
                color: white !important;
                text-shadow: 0 0 3px darkred;
            }
            .injetar-btn:hover {
                background: #ff4444;
            }
            .panel {
                animation: glowPulse 2s infinite;
            }
            @keyframes glowPulse {
                0% { border-color: #ff2222; box-shadow: 0 0 5px rgba(255,0,0,0.3);}
                100% { border-color: #ff5555; box-shadow: 0 0 15px rgba(255,0,0,0.5);}
            }
        `;
        document.head.appendChild(styleInject);
        
        // Simula uma "engine Java" integrada e faz o AIMBOT responder automaticamente ao modo escolhido
        // Como o original tem "AO ATIRA AO OLHA" então forçamos que a engine responda a esses gatilhos
        // Adiciona também um efeito sonoro visual com notificações no console
        
        // Cria variavel para garantir que o modo "AO ATIRA" ative com mais frequência
        let lastShotSimulation = 0;
        setInterval(() => {
            if (!engineState.injected) return;
            const now = Date.now();
            if (engineState.currentModo === "atira") {
                // Simula disparos a cada 2-3 segundos pra demonstrar
                if (now - lastShotSimulation > 2800) {
                    lastShotSimulation = now;
                    const logDiv = document.getElementById('logArea');
                    const shotLog = document.createElement('div');
                    shotLog.className = 'log-line';
                    shotLog.style.fontSize = '10px';
                    shotLog.style.color = '#ff8888';
                    shotLog.innerHTML = `🔫 DISPARO SIMULADO | No Recoil ATIVO | Mira ajustada para FOV ${engineState.fov}%`;
                    logDiv.appendChild(shotLog);
                    while(logDiv.children.length > 9) {
                        if(logDiv.children[2]) logDiv.removeChild(logDiv.children[2]);
                    }
                    // Executa engine para mostrar que o AIMBOT respondeu
                    executeEngine();
                }
            } else {
                // Modo "AO OLHA" - simula que o jogador está mirando a cada 2 segundos
                if (now - lastShotSimulation > 2200) {
                    lastShotSimulation = now;
                    const logDiv = document.getElementById('logArea');
                    const aimLog = document.createElement('div');
                    aimLog.className = 'log-line';
                    aimLog.style.fontSize = '10px';
                    aimLog.style.color = '#ff8888';
                    aimLog.innerHTML = `👁️ MIRA DETECTADA (AO OLHA) | 2X BYPASS ativado | FOV ${engineState.fov}%`;
                    logDiv.appendChild(aimLog);
                    while(logDiv.children.length > 9) {
                        if(logDiv.children[2]) logDiv.removeChild(logDiv.children[2]);
                    }
                    executeEngine();
                }
            }
        }, 2200);
        
        // Texto adicional na área AIMLOCK INFO para mostrar "BYPASS" quando injetado
        function updateAimlockExtra() {
            const aimlockDiv = document.querySelector('.aimlock-section');
            let extraSpan = document.getElementById('bypassExtraSpan');
            if (engineState.injected && !extraSpan) {
                const newSpan = document.createElement('div');
                newSpan.id = 'bypassExtraSpan';
                newSpan.style.fontSize = '12px';
                newSpan.style.color = '#ff4444';
                newSpan.style.marginTop = '8px';
                newSpan.style.fontWeight = 'bold';
                newSpan.innerHTML = '🔓 2X BYPASS ATIVO 🔓';
                aimlockDiv.appendChild(newSpan);
            } else if (!engineState.injected && extraSpan) {
                extraSpan.remove();
            } else if (engineState.injected && extraSpan) {
                extraSpan.innerHTML = '🔓 2X BYPASS + NO RECOIL 🔓';
            }
        }
        
        setInterval(updateAimlockExtra, 300);
        
        // Finalmente, garante que o texto "AUXILIO EXTERNAL" fique exatamente como na foto
        // e que as funções sejam as mesmas: AO ATIRA / AO OLHA dentro da área funções:
        // O layout está identico com os cards e o INJETAR em destaque.
        
        // Adiciona um pequeno detalhe visual pra simular o "Fov 5%" do texto com slider interativo
        // e o "AIMBOT No Recoil AIMBOT 2X BYPASS" sempre presentes no painel.
        
        console.log("Painel AUXILIO IOS carregado - Engine em modo EXTERNAL com Java bridge simulada");
        
        // Ao carregar, exibe no log que o AIMBOT 2X BYPASS está pronto
        setTimeout(() => {
            if (!engineState.injected) {
                const logDiv = document.getElementById('logArea');
                const readyLog = document.createElement('div');
                readyLog.className = 'log-line';
                readyLog.style.color = '#ff6666';
                readyLog.innerHTML = `⚡ AIMBOT 2X BYPASS pronto para injeção | No Recoil disponível`;
                logDiv.appendChild(readyLog);
            }
        }, 500);
    </script>
</body>
</html>
