<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AUXILIO IPHONE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 380px;
            width: 100%;
            background: #0d0d0d;
            border-radius: 35px;
            padding: 25px 22px 35px;
            border: 1px solid #1a1a1a;
        }

        /* AUXILIO BY @WIRTZADA */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.3px;
        }
        .header h1 span {
            color: #ff3b30;
        }

        /* LINHA Aimbot    Info */
        .top-linha {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 25px;
            padding: 0 5px;
        }
        .top-linha .aimbot {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
        }
        .top-linha .info {
            font-size: 20px;
            font-weight: 500;
            color: #6c6c6c;
        }

        /* Ativar Auxílio */
        .ativar-auxilio {
            background: #1a1a1a;
            border-radius: 25px;
            padding: 14px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2a2a2a;
        }
        .ativar-auxilio span {
            font-size: 18px;
            font-weight: 500;
            color: #e0e0e0;
        }
        .toggle {
            width: 51px;
            height: 31px;
            background: #3a3a3a;
            border-radius: 31px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .toggle.active {
            background: #ff3b30;
        }
        .toggle .knob {
            width: 27px;
            height: 27px;
            background: #ffffff;
            border-radius: 27px;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: 0.2s;
        }
        .toggle.active .knob {
            left: 22px;
        }

        /* Ativar Fov + Fov 0 */
        .fov-linha {
            background: #1a1a1a;
            border-radius: 25px;
            padding: 14px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2a2a2a;
        }
        .fov-esquerda {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .fov-esquerda span {
            font-size: 18px;
            font-weight: 500;
            color: #e0e0e0;
        }
        .fov-valor {
            font-size: 18px;
            font-weight: 600;
            color: #ff3b30;
        }

        /* Auxílio Head */
        .head-linha {
            background: #1a1a1a;
            border-radius: 25px;
            padding: 14px 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2a2a2a;
        }
        .head-linha span {
            font-size: 18px;
            font-weight: 500;
            color: #e0e0e0;
        }
        .head-toggle {
            width: 51px;
            height: 31px;
            background: #3a3a3a;
            border-radius: 31px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .head-toggle.active {
            background: #ff3b30;
        }
        .head-toggle .knob {
            width: 27px;
            height: 27px;
            background: #ffffff;
            border-radius: 27px;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: 0.2s;
        }
        .head-toggle.active .knob {
            left: 22px;
        }

        /* Tipo de Aimbot: Ao Atirar    Ao Olhar */
        .tipo-section {
            margin-bottom: 30px;
        }
        .tipo-label {
            font-size: 16px;
            font-weight: 500;
            color: #aaaaaa;
            margin-bottom: 12px;
        }
        .tipo-buttons {
            display: flex;
            gap: 15px;
        }
        .tipo-btn {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 30px;
            padding: 12px 0;
            text-align: center;
            font-size: 17px;
            font-weight: 500;
            color: #888888;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tipo-btn.active {
            background: #ff3b30;
            border-color: #ff3b30;
            color: #ffffff;
        }

        /* INJETAR FUNÇÕES NO JOGO */
        .injetar-btn {
            width: 100%;
            background: #ff3b30;
            border: none;
            border-radius: 35px;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.1s linear;
        }
        .injetar-btn:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        /* boltz + demonstração */
        .footer {
            text-align: center;
            margin-top: 10px;
        }
        .footer .user {
            font-size: 15px;
            font-weight: 500;
            color: #5e5e5e;
            margin-bottom: 8px;
        }
        .footer .demo {
            font-size: 13px;
            color: #3a3a3a;
        }

        /* status area */
        .status-area {
            background: #080808;
            border-radius: 18px;
            padding: 12px 15px;
            margin-top: 20px;
            border: 1px solid #1f1f1f;
        }
        .status-line {
            font-size: 12px;
            color: #6c6c6c;
            font-family: monospace;
            margin: 4px 0;
        }
        .status-line span {
            color: #ff3b30;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- AUXILIO BY @WIRTZADA -->
        <div class="header">
            <h1>AUXILIO BY <span>@WIRTZADA</span></h1>
        </div>

        <!-- Aimbot    Info -->
        <div class="top-linha">
            <span class="aimbot">Aimbot</span>
            <span class="info">Info</span>
        </div>

        <!-- Ativar Auxílio -->
        <div class="ativar-auxilio">
            <span>Ativar Auxílio</span>
            <div class="toggle" id="toggleAuxilio">
                <div class="knob"></div>
            </div>
        </div>

        <!-- Ativar Fov / Fov 0 -->
        <div class="fov-linha">
            <div class="fov-esquerda">
                <span>Ativar Fov</span>
                <span class="fov-valor" id="fovValor">Fov 0</span>
            </div>
            <div class="toggle" id="toggleFov">
                <div class="knob"></div>
            </div>
        </div>

        <!-- Auxílio Head -->
        <div class="head-linha">
            <span>Auxílio Head</span>
            <div class="head-toggle" id="toggleHead">
                <div class="knob"></div>
            </div>
        </div>

        <!-- Tipo de Aimbot: Ao Atirar / Ao Olhar -->
        <div class="tipo-section">
            <div class="tipo-label">Tipo de Aimbot:</div>
            <div class="tipo-buttons">
                <div class="tipo-btn" data-tipo="atirar" id="btnAtirar">Ao Atirar</div>
                <div class="tipo-btn" data-tipo="olhar" id="btnOlhar">Ao Olhar</div>
            </div>
        </div>

        <!-- INJETAR FUNÇÕES NO JOGO -->
        <button class="injetar-btn" id="injetarBtn">INJETAR FUNÇÕES NO JOGO</button>

        <!-- Footer com boltz e demonstração -->
        <div class="footer">
            <div class="user">boltz 🎵 Ontem às 13:07</div>
            <div class="demo">demonstração **AUXILIO IPHONE DNS**</div>
        </div>

        <!-- Área de status (opcional, igual ao print não tinha mas pra feedback) -->
        <div class="status-area" id="statusArea">
            <div class="status-line">> STATUS: <span id="statusMsg">AGUARDANDO</span></div>
            <div class="status-line">> AUXILIO: <span id="auxilioStatus">DESATIVADO</span></div>
            <div class="status-line">> FOV: <span id="fovStatus">0</span> | HEAD: <span id="headStatus">OFF</span></div>
            <div class="status-line">> MODO: <span id="modoStatus">--</span></div>
        </div>
    </div>

    <script>
        // Estado do sistema
        let state = {
            auxilioAtivo: false,
            fovAtivo: false,
            headAtivo: false,
            fovValor: 0,
            tipoAimbot: "atirar", // atirar ou olhar
            injetado: false
        };

        // Elementos DOM
        const toggleAuxilio = document.getElementById('toggleAuxilio');
        const toggleFov = document.getElementById('toggleFov');
        const toggleHead = document.getElementById('toggleHead');
        const btnAtirar = document.getElementById('btnAtirar');
        const btnOlhar = document.getElementById('btnOlhar');
        const injetarBtn = document.getElementById('injetarBtn');
        const fovValorSpan = document.getElementById('fovValor');
        const statusMsgSpan = document.getElementById('statusMsg');
        const auxilioStatusSpan = document.getElementById('auxilioStatus');
        const fovStatusSpan = document.getElementById('fovStatus');
        const headStatusSpan = document.getElementById('headStatus');
        const modoStatusSpan = document.getElementById('modoStatus');

        // Atualiza interface
        function updateUI() {
            // Toggle Auxílio
            if (state.auxilioAtivo) {
                toggleAuxilio.classList.add('active');
                auxilioStatusSpan.innerText = 'ATIVADO';
            } else {
                toggleAuxilio.classList.remove('active');
                auxilioStatusSpan.innerText = 'DESATIVADO';
            }

            // Toggle FOV
            if (state.fovAtivo) {
                toggleFov.classList.add('active');
                fovValorSpan.innerText = `Fov ${state.fovValor}`;
                fovStatusSpan.innerText = state.fovValor;
            } else {
                toggleFov.classList.remove('active');
                fovValorSpan.innerText = 'Fov 0';
                fovStatusSpan.innerText = '0';
            }

            // Toggle Head
            if (state.headAtivo) {
                toggleHead.classList.add('active');
                headStatusSpan.innerText = 'ON';
            } else {
                toggleHead.classList.remove('active');
                headStatusSpan.innerText = 'OFF';
            }

            // Tipo Aimbot
            if (state.tipoAimbot === 'atirar') {
                btnAtirar.classList.add('active');
                btnOlhar.classList.remove('active');
                modoStatusSpan.innerText = 'AO ATIRAR';
            } else {
                btnOlhar.classList.add('active');
                btnAtirar.classList.remove('active');
                modoStatusSpan.innerText = 'AO OLHAR';
            }
        }

        // Função para atualizar FOV (valor varia de 0 a 10)
        function updateFovValue(newValue) {
            if (!state.fovAtivo) {
                state.fovValor = 0;
            } else {
                state.fovValor = Math.min(10, Math.max(0, newValue));
            }
            fovValorSpan.innerText = `Fov ${state.fovValor}`;
            fovStatusSpan.innerText = state.fovValor;
            if (state.injetado && state.auxilioAtivo) {
                statusMsgSpan.innerText = `FOV AJUSTADO PARA ${state.fovValor}`;
                setTimeout(() => {
                    if (state.injetado) statusMsgSpan.innerText = "INJETADO";
                    else statusMsgSpan.innerText = "AGUARDANDO";
                }, 1500);
            }
        }

        // Incrementar FOV quando clicar no FovValor (como se fosse slider, mas igual ao print)
        // No print tem "Fov 0", vamos permitir clicar pra aumentar igual auxílio head
        fovValorSpan.style.cursor = 'pointer';
        fovValorSpan.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!state.fovAtivo) return;
            let novoValor = state.fovValor + 1;
            if (novoValor > 10) novoValor = 0;
            updateFovValue(novoValor);
            if (state.injetado && state.auxilioAtivo) {
                // simula engine
                console.log(`FOV alterado para ${novoValor}`);
            }
        });

        // Toggle Auxílio
        toggleAuxilio.addEventListener('click', () => {
            state.auxilioAtivo = !state.auxilioAtivo;
            updateUI();
            if (state.injetado) {
                if (state.auxilioAtivo) {
                    statusMsgSpan.innerText = "AUXILIO ATIVO NO JOGO";
                } else {
                    statusMsgSpan.innerText = "AUXILIO DESATIVADO";
                }
                setTimeout(() => {
                    if (state.injetado) statusMsgSpan.innerText = "INJETADO";
                    else statusMsgSpan.innerText = "AGUARDANDO";
                }, 1500);
            }
        });

        // Toggle Fov
        toggleFov.addEventListener('click', () => {
            state.fovAtivo = !state.fovAtivo;
            if (!state.fovAtivo) {
                state.fovValor = 0;
            } else {
                if (state.fovValor === 0) state.fovValor = 5;
            }
            updateUI();
            if (state.injetado && state.auxilioAtivo) {
                statusMsgSpan.innerText = state.fovAtivo ? `FOV ATIVADO (${state.fovValor})` : "FOV DESATIVADO";
                setTimeout(() => {
                    if (state.injetado) statusMsgSpan.innerText = "INJETADO";
                    else statusMsgSpan.innerText = "AGUARDANDO";
                }, 1200);
            }
        });

        // Toggle Auxílio Head
        toggleHead.addEventListener('click', () => {
            state.headAtivo = !state.headAtivo;
            updateUI();
            if (state.injetado && state.auxilioAtivo) {
                statusMsgSpan.innerText = state.headAtivo ? "AUXILIO HEAD ATIVO (Prioridade cabeça)" : "HEAD DESATIVADO";
                setTimeout(() => {
                    if (state.injetado) statusMsgSpan.innerText = "INJETADO";
                    else statusMsgSpan.innerText = "AGUARDANDO";
                }, 1200);
            }
        });

        // Botões tipo aimbot
        btnAtirar.addEventListener('click', () => {
            if (state.tipoAimbot === 'atirar') return;
            state.tipoAimbot = 'atirar';
            updateUI();
            if (state.injetado) {
                statusMsgSpan.innerText = "TIPO AIMBOT: AO ATIRAR";
                setTimeout(() => {
                    if (state.injetado) statusMsgSpan.innerText = "INJETADO";
                    else statusMsgSpan.innerText = "AGUARDANDO";
                }, 1200);
            }
        });

        btnOlhar.addEventListener('click', () => {
            if (state.tipoAimbot === 'olhar') return;
            state.tipoAimbot = 'olhar';
            updateUI();
            if (state.injetado) {
                statusMsgSpan.innerText = "TIPO AIMBOT: AO OLHAR";
                setTimeout(() => {
                    if (state.injetado) statusMsgSpan.innerText = "INJETADO";
                    else statusMsgSpan.innerText = "AGUARDANDO";
                }, 1200);
            }
        });

        // INJETAR FUNÇÕES NO JOGO (Engine + Java)
        injetarBtn.addEventListener('click', () => {
            if (!state.injetado) {
                state.injetado = true;
                statusMsgSpan.innerText = "INJETADO";
                
                // Simula injeção de todas as funções no jogo
                let msg = "";
                if (state.auxilioAtivo) msg += "Auxílio ativo. ";
                if (state.fovAtivo) msg += `FOV ${state.fovValor}. `;
                if (state.headAtivo) msg += "Headshot priority. ";
                msg += `Modo: ${state.tipoAimbot === 'atirar' ? 'Ao Atirar' : 'Ao Olhar'}.`;
                
                // Mostra no status
                const auxilioSpan = document.getElementById('auxilioStatus');
                if (state.auxilioAtivo) auxilioSpan.innerText = "ATIVADO";
                statusMsgSpan.innerText = "INJETADO | " + msg.substring(0, 40);
                
                // Adiciona linha de log extra
                const statusArea = document.getElementById('statusArea');
                const logLine = document.createElement('div');
                logLine.className = 'status-line';
                logLine.style.color = '#ff3b30';
                logLine.innerHTML = `> INJECT: AUXILIO IPHONE DNS CARREGADO`;
                statusArea.appendChild(logLine);
                
                // efeito visual
                injetarBtn.style.opacity = '0.9';
                setTimeout(() => {
                    injetarBtn.style.opacity = '1';
                }, 200);
                
                // Simular engine funcionando conforme modo
                simulateEngine();
                
            } else {
                // Se já injetado, reaplica as funções
                statusMsgSpan.innerText = "FUNÇÕES REINJETADAS";
                let msgReinject = "";
                if (state.auxilioAtivo) msgReinject += "Aimbot ativo. ";
                if (state.fovAtivo) msgReinject += `FOV ${state.fovValor}. `;
                if (state.headAtivo) msgReinject += "Head ativo. ";
                statusMsgSpan.innerText = "REINJETADO | " + (msgReinject || "configurações aplicadas");
                
                const statusArea = document.getElementById('statusArea');
                const reinjLine = document.createElement('div');
                reinjLine.className = 'status-line';
                reinjLine.innerHTML = `> REINJECT: Funções atualizadas no jogo`;
                statusArea.appendChild(reinjLine);
                
                simulateEngine();
            }
            
            // Limitar linhas do status area
            const statusAreaDiv = document.getElementById('statusArea');
            while(statusAreaDiv.children.length > 8) {
                if(statusAreaDiv.children[3]) statusAreaDiv.removeChild(statusAreaDiv.children[3]);
            }
        });
        
        // Engine que simula aimbot conforme configurações
        function simulateEngine() {
            if (!state.injetado) return;
            if (!state.auxilioAtivo) {
                // Se auxílio desligado, não faz nada
                return;
            }
            
            // Simulação de funcionamento do aimbot
            let aimbotType = state.tipoAimbot === 'atirar' ? "ao atirar" : "ao olhar";
            let fovText = state.fovAtivo ? `FOV ativo (${state.fovValor}%)` : "FOV desativado";
            let headText = state.headAtivo ? " | Mira prioritária na cabeça" : "";
            
            const statusArea = document.getElementById('statusArea');
            const time = new Date().toLocaleTimeString();
            const logMsg = document.createElement('div');
            logMsg.className = 'status-line';
            logMsg.style.fontSize = '10px';
            logMsg.style.opacity = '0.8';
            logMsg.innerHTML = `> [${time}] Aimbot ${aimbotType} | ${fovText}${headText}`;
            statusArea.appendChild(logMsg);
            
            while(statusArea.children.length > 10) {
                if(statusArea.children[3]) statusArea.removeChild(statusArea.children[3]);
            }
        }
        
        // Evento para simular gatilho automático quando modo "Ao Atirar" ou "Ao Olhar"
        // Isso faz o painel demonstrar as funções sem precisar de interação externa (igual ao conceito)
        let lastTrigger = 0;
        setInterval(() => {
            if (!state.injetado) return;
            if (!state.auxilioAtivo) return;
            
            const now = Date.now();
            if (state.tipoAimbot === 'atirar') {
                // simulando disparo a cada 3.5 segundos
                if (now - lastTrigger > 3500) {
                    lastTrigger = now;
                    const statusArea = document.getElementById('statusArea');
                    const shotLog = document.createElement('div');
                    shotLog.className = 'status-line';
                    shotLog.style.color = '#ff6b6b';
                    shotLog.innerHTML = `> 🔫 DISPARO DETECTADO | Aimbot ajustando mira ${state.fovAtivo ? `(FOV ${state.fovValor})` : ''} ${state.headAtivo ? '+ Head' : ''}`;
                    statusArea.appendChild(shotLog);
                    while(statusArea.children.length > 10) {
                        if(statusArea.children[3]) statusArea.removeChild(statusArea.children[3]);
                    }
                }
            } else {
                // Ao Olhar: simula mira a cada 2.8 segundos
                if (now - lastTrigger > 2800) {
                    lastTrigger = now;
                    const statusArea = document.getElementById('statusArea');
                    const aimLog = document.createElement('div');
                    aimLog.className = 'status-line';
                    aimLog.style.color = '#ff6b6b';
                    aimLog.innerHTML = `> 👁️ MIRA DETECTADA (AO OLHAR) | Aimbot ativo ${state.fovAtivo ? `FOV ${state.fovValor}` : ''}`;
                    statusArea.appendChild(aimLog);
                    while(statusArea.children.length > 10) {
                        if(statusArea.children[3]) statusArea.removeChild(statusArea.children[3]);
                    }
                }
            }
        }, 800);
        
        // Inicialização
        updateUI();
        
        // Suporte para toques no iPhone
        const allButtons = document.querySelectorAll('.toggle, .tipo-btn, .injetar-btn, .fov-valor');
        allButtons.forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                // apenas para garantir resposta tátil
            });
        });

        // Garantir FOV inicial 0 e que clicar no texto funcione apenas quando ativado
        state.fovValor = 0;
        updateFovValue(0);
        
        // Estilo extra para manter exatamente igual a foto: sem elementos estranhos, layout fiel
        // botão INJETAR FUNÇÕES NO JOGO igual ao print
        // tudo em tons escuros, fonte padrão iOS
        console.log("Painel AUXILIO IPHONE DNS carregado - Modo exato da imagem");
    </script>
</body>
</html>
